<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Field Adoption Rate</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 32px; }
h1 { font-size: 28px; margin-bottom: 8px; }
.subtitle { color: #64748b; margin-bottom: 32px; font-size: 14px; }
.dashboard { display: flex; flex-wrap: wrap; gap: 24px; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; flex: 1 1 400px; }
.card h2 { font-size: 18px; margin-bottom: 4px; }
.card .meta { color: #64748b; font-size: 12px; margin-bottom: 16px; }
.chart-wrap { position: relative; height: 280px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
th, td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; }
th { font-weight: 600; color: #475569; background: #f8fafc; position: sticky; top: 0; }
td:first-child, th:first-child { text-align: left; }
.adopt-bar { display: inline-block; height: 16px; border-radius: 4px; background: #22c55e; vertical-align: middle; }
.adopt-bar.bg-yellow { background: #eab308; }
.adopt-bar.bg-red { background: #ef4444; }
</style>
</head>
<body>

<h1>KPI Field Adoption Rate</h1>
<p class="subtitle">Percentage of issues where each KPI radio-button field has been set (Yes or No)</p>
<div id="summaryStats" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px"></div>

<div class="dashboard" id="app"></div>

<script>
const DATA = {
  "GGQPA": {
    "label": "AI Native features",
    "total": 11,
    "counts": {
      "customfield_12317": {"Yes": 11, "No": 0, "None": 0},
      "customfield_12318": {"Yes": 10, "No": 0, "None": 1},
      "customfield_12319": {"Yes": 9, "No": 1, "None": 1},
      "customfield_12320": {"Yes": 7, "No": 2, "None": 2},
      "customfield_12321": {"Yes": 3, "No": 3, "None": 5}
    }
  },
  "GGAHTP": {
    "label": "[P0] [UI] Endorsement",
    "total": 10,
    "counts": {
      "customfield_12317": {"Yes": 10, "No": 0, "None": 0},
      "customfield_12318": {"Yes": 10, "No": 0, "None": 0},
      "customfield_12319": {"Yes": 10, "No": 0, "None": 0},
      "customfield_12320": {"Yes": 3, "No": 4, "None": 3},
      "customfield_12321": {"Yes": 6, "No": 0, "None": 4}
    }
  },
  "GGQFA": {
    "label": "RevRec (excl. To Do & Bug)",
    "total": 9,
    "counts": {
      "customfield_12317": {"Yes": 9, "No": 0, "None": 0},
      "customfield_12318": {"Yes": 9, "No": 0, "None": 0},
      "customfield_12319": {"Yes": 9, "No": 0, "None": 0},
      "customfield_12320": {"Yes": 9, "No": 0, "None": 0},
      "customfield_12321": {"Yes": 8, "No": 0, "None": 1}
    }
  }
};

const FIELD_NAMES = {
  "customfield_12317": "Business Analysis",
  "customfield_12318": "Task Decomposition",
  "customfield_12319": "Code Generation",
  "customfield_12320": "Code Review",
  "customfield_12321": "Edge Cases & Quality"
};

const FIELD_ORDER = [
  "customfield_12317",  // Business Analysis
  "customfield_12318",  // Task Decomposition
  "customfield_12319",  // Code Generation
  "customfield_12320",  // Code Review
  "customfield_12321",  // Edge Cases & Quality
];

const COLORS = {
  GGQPA: { bg: "rgba(99,102,241,0.7)", border: "#6366f1" },   // indigo
  GGAHTP: { bg: "rgba(251,146,60,0.7)", border: "#fb923c" },  // orange
  GGQFA: { bg: "rgba(52,211,153,0.7)", border: "#34d399" }     // teal
};
const PROJECT_LABELS = {
  GGQPA: "GGQPA · AI Native",
  GGAHTP: "GGAHTP · [P0] [UI] Endorsement",
  GGQFA: "GGQFA · RevRec"
};

const app = document.getElementById('app');
const labels = FIELD_ORDER.map(cf => FIELD_NAMES[cf]);
const projects = Object.keys(DATA);

// ---- Summary Stats ----
function calcTotalAdoption(projFilter) {
  let adopted = 0, total = 0;
  for (const proj of (projFilter ? [projFilter] : projects)) {
    const d = DATA[proj];
    for (const cf of Object.keys(FIELD_NAMES)) {
      const c = d.counts[cf];
      adopted += c.Yes + c.No;
      total += d.total;
    }
  }
  return total > 0 ? adopted / total : 0;
}
const summaryEl = document.getElementById('summaryStats');
// Per project total adoption
projects.forEach(proj => {
  const rate = calcTotalAdoption(proj);
  const div = document.createElement('div');
  div.style.cssText = 'background:#fff;border-radius:8px;padding:12px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex:1;min-width:180px';
  div.innerHTML = `
    <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px">${proj}</div>
    <div style="font-size:28px;font-weight:700;margin-top:4px">${Math.round(rate * 100)}%</div>
    <div style="font-size:12px;color:#94a3b8">overall adoption</div>
  `;
  summaryEl.appendChild(div);
});
// Grand total
const grandRate = calcTotalAdoption(null);
const grandDiv = document.createElement('div');
grandDiv.style.cssText = 'background:#1e293b;border-radius:8px;padding:12px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex:1;min-width:180px;color:#fff';
grandDiv.innerHTML = `
  <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px">ALL PROJECTS</div>
  <div style="font-size:28px;font-weight:700;margin-top:4px">${Math.round(grandRate * 100)}%</div>
  <div style="font-size:12px;color:#64748b">overall adoption</div>
`;
summaryEl.appendChild(grandDiv);

// ---- Combined grouped bar chart ----
const combinedCard = document.createElement('div');
combinedCard.className = 'card';
combinedCard.style.flex = '1 1 100%';
combinedCard.innerHTML = `<h2>Cross-Project Comparison</h2><p class="meta">Adoption Rate = (Yes + No) / Total issues per project</p><div class="chart-wrap"><canvas id="combinedChart"></canvas></div>`;
app.appendChild(combinedCard);

const combinedCtx = document.getElementById('combinedChart').getContext('2d');
const datasets = projects.map(proj => {
  const d = DATA[proj];
  const rates = FIELD_ORDER.map(cf => {
    const c = d.counts[cf];
    return d.total > 0 ? Math.round((c.Yes + c.No) / d.total * 100) : 0;
  });
  return {
    label: PROJECT_LABELS[proj],
    data: rates,
    backgroundColor: COLORS[proj].bg,
    borderColor: COLORS[proj].border,
    borderWidth: 2,
    borderRadius: 4,
  };
});

new Chart(combinedCtx, {
  type: 'bar',
  data: { labels, datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom' },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw}%` } }
    },
    scales: {
      y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } }
    }
  }
});

// ---- Per-project cards ----
projects.forEach(proj => {
  const d = DATA[proj];
  const card = document.createElement('div');
  card.className = 'card';

  // Chart
  const chartId = 'chart_' + proj;
  card.innerHTML = `
    <h2>${proj}</h2>
    <p class="meta">${d.label} · ${d.total} issues</p>
    <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
    <table>
      <thead><tr><th>Field</th><th>Yes</th><th>No</th><th>None</th><th>Adoption</th></tr></thead>
      <tbody id="tbody_${proj}"></tbody>
    </table>
  `;
  app.appendChild(card);

  // Bar chart
  const ctx = document.getElementById(chartId).getContext('2d');
  const rates = FIELD_ORDER.map(cf => {
    const c = d.counts[cf];
    return d.total > 0 ? Math.round((c.Yes + c.No) / d.total * 100) : 0;
  });
  const yesData = FIELD_ORDER.map(cf => d.counts[cf].Yes);
  const noData = FIELD_ORDER.map(cf => d.counts[cf].No);
  const noneData = FIELD_ORDER.map(cf => d.counts[cf].None);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Yes',
          data: yesData,
          backgroundColor: '#22c55e',
          borderRadius: 2,
        },
        {
          label: 'No',
          data: noData,
          backgroundColor: '#ef4444',
          borderRadius: 2,
        },
        {
          label: 'None',
          data: noneData,
          backgroundColor: '#e2e8f0',
          borderRadius: 2,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });

  // Table
  const tbody = document.getElementById('tbody_' + proj);
  FIELD_ORDER.forEach(cf => {
    const c = d.counts[cf];
    const adopted = c.Yes + c.No;
    const rate = d.total > 0 ? (adopted / d.total * 100) : 0;
    const barColor = rate >= 70 ? '' : rate >= 30 ? 'bg-yellow' : 'bg-red';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${FIELD_NAMES[cf]}</td>
      <td>${c.Yes}</td>
      <td>${c.No}</td>
      <td>${c.None}</td>
      <td>
        <span style="display:inline-flex;align-items:center;gap:6px;min-width:100px">
          <span class="adopt-bar ${barColor}" style="width:${Math.round(rate)}%"></span>
          <span>${Math.round(rate)}%</span>
        </span>
      </td>
    `;
    tbody.appendChild(tr);
  });
});
</script>
</body>
</html>
